<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENOX FF - Ultra Sensi Generator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0d0d0d; color: #ffffff; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        /* Top Banner */
        .banner { background: linear-gradient(90deg, #ff3333, #b30000); width: 100%; text-align: center; padding: 10px; font-weight: bold; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; border-radius: 4px; }
        .banner a { color: #fff; text-decoration: underline; margin-left: 10px; }
        
        /* Logo Header */
        .header { width: 100%; max-width: 450px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-size: 28px; font-weight: 900; color: #ff3333; letter-spacing: 2px; }
        .menu-icon { font-size: 24px; cursor: pointer; }
        
        /* Main Container */
        .card { background-color: #141414; border: 1px solid #222; border-radius: 16px; padding: 25px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); position: relative; }
        .badge { background: linear-gradient(90deg, #ffcc00, #ff9900); color: #000; padding: 4px 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; border-radius: 20px; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); }
        
        /* Form Styling */
        .title-area { display: flex; align-items: center; gap: 10px; margin-top: 10px; margin-bottom: 20px; justify-content: center; }
        .title-area h2 { font-size: 22px; font-weight: 700; }
        .fire-icon { color: #ff5500; font-size: 22px; }
        
        label { display: block; font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
        
        /* OS Buttons */
        .os-container { display: flex; gap: 12px; margin-bottom: 20px; }
        .os-btn { flex: 1; padding: 12px; border: 2px solid #222; background-color: #1a1a1a; color: #888; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .os-btn.active { border-color: #ff3333; background-color: #ff3333; color: white; }
        
        /* Input Boxes */
        input { width: 100%; padding: 14px; background-color: #1c1c1c; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        input:focus { border-color: #ff3333; outline: none; }
        
        /* Action Button */
        .gen-btn { width: 100%; padding: 15px; background: linear-gradient(90deg, #ff3333, #ff5500); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 15px rgba(255,51,51,0.3); margin-bottom: 25px; }
        
        /* Screenshot-matched Results Section */
        .results-header { text-align: center; display: none; color: #ff3333; font-size: 11px; font-weight: bold; letter-spacing: 0.5px; line-height: 1.4; margin-bottom: 20px; text-transform: uppercase; }
        .results-list { display: none; flex-direction: column; gap: 4px; }
        .res-row { display: flex; justify-content: space-between; padding: 12px 0; align-items: center; }
        .res-label { color: #ffcc00; font-weight: bold; font-size: 16px; }
        .res-val { font-weight: bold; font-size: 18px; color: #00ffcc; }
    </style>
</head>
<body>

    <!-- Top Promo Banner -->
    <div class="banner">
        🎉 ZENOX SENSI 100K DOWNLOADS CELEBRATION! <a href="#">GET REWARDS ⚡</a>
    </div>

    <!-- Header Block -->
    <div class="header">
        <div class="logo">ZENOX FF</div>
        <div class="menu-icon">☰</div>
    </div>

    <!-- Card Generator -->
    <div class="card">
        <div class="badge">Auto-Headshot v3.2</div>
        
        <div class="title-area">
            <span class="fire-icon">⚡</span>
            <h2>Sensi Generator</h2>
        </div>

        <label>Select Device OS</label>
        <div class="os-container">
            <button id="btn-android" class="os-btn active" onclick="setOS('Android')">🤖 Android</button>
            <button id="btn-iphone" class="os-btn" onclick="setOS('iPhone')">🍏 iPhone</button>
        </div>

        <label>Device Model (e.g., Redmi Note 12)</label>
        <input type="text" id="model" placeholder="Enter device model...">

        <label>Device Age (In Years)</label>
        <input type="number" id="age" placeholder="0 for new device...">

        <button class="gen-btn" onclick="generateSensi()">Generate Perfect Sensi</button>

        <!-- New Clean Dynamic Output Layout Matching Your Reference Image -->
        <div class="results-header" id="resHeader">
            RECOMMENDED MACRO/DPI SCALE (0 - 200) FOR NO-RECOIL HEADSHOTS:
        </div>

        <div class="results-list" id="resList">
            <div class="res-row"><span class="res-label">General:</span><span class="res-val" id="v1">0</span></div>
            <div class="res-row"><span class="res-label">Red Dot:</span><span class="res-val" id="v2">0</span></div>
            <div class="res-row"><span class="res-label">2x Scope:</span><span class="res-val" id="v3">0</span></div>
            <div class="res-row"><span class="res-label">4x Scope:</span><span class="res-val" id="v4">0</span></div>
            <div class="res-row"><span class="res-label">Sniper Scope:</span><span class="res-val" id="v5">0</span></div>
            <div class="res-row"><span class="res-label">Free Look:</span><span class="res-val" id="v6">0</span></div>
        </div>
    </div>

    <script>
        let currentOS = 'Android';

        function setOS(os) {
            currentOS = os;
            document.getElementById('btn-android').classList.remove('active');
            document.getElementById('btn-iphone').classList.remove('active');
            
            if(os === 'Android') {
                document.getElementById('btn-android').classList.add('active');
            } else {
                document.getElementById('btn-iphone').classList.add('active');
            }
        }

        function generateSensi() {
            let modelInput = document.getElementById('model').value.trim();
            let ageInput = parseInt(document.getElementById('age').value) || 0;

            if(!modelInput) { alert('Please enter your device model first!'); return; }

            // Tuning values to hit optimal low-recoil, high-sensitivity targets
            // Older screens require a slightly stronger baseline to counter display latency
            let ageMod = ageInput > 0 ? (ageInput * 3) : 2;
            let targetBase = currentOS === 'iPhone' ? (182 + ageMod) : (178 + ageMod);
            
            // Random variation to make values unique per device execution
            let dynamicShift = Math.floor(Math.random() * 5);

            // General & Red Dot dominate close-to-mid range micro-drags to break standard torso auto-aim
            let general = Math.min(200, targetBase + dynamicShift + 3);
            let redDot = Math.min(200, targetBase + dynamicShift - 1);
            
            // Scopes balanced tight around high-velocity zones for zero frame-skipping over distance
            let scope2x = Math.min(200, targetBase + dynamicShift - 5);
            let scope4x = Math.min(200, targetBase + dynamicShift - 3);
            let sniper = Math.min(200, 135 + dynamicShift + ageMod); 
            let freeLook = Math.min(200, targetBase + dynamicShift - 15);

            // Update UI elements
            document.getElementById('v1').innerText = general;
            document.getElementById('v2').innerText = redDot;
            document.getElementById('v3').innerText = scope2x;
            document.getElementById('v4').innerText = scope4x;
            document.getElementById('v5').innerText = sniper;
            document.getElementById('v6').innerText = freeLook;

            // Make text and data elements appear simultaneously
            document.getElementById('resHeader').style.display = 'block';
            document.getElementById('resList').style.display = 'flex';
        }
    </script>
</body>
</html>
